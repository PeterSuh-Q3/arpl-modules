# # 注意：所有 include 组合会在 exclude 之后处理。 这允许你使用 include 添加回以前排除的组合。
# version: [ 6.2, 7.1, 7.2 ]
# platform: [ apollolake, broadwell, broadwellnk, bromolow, denverton, epyc7002, geminilake, r1000, v1000 ]
# exclude:
#   - version: 7.1
#     platform: broadwell
# include:
#   - version: "7.2"
#     platform: "broadwell"

name: Build modules

on:  
  #release:
    #types: [published]

  workflow_dispatch:
    #inputs:
      #version:
        #description: 'format %y.%-m.$i or auto'
        #required: false
        #type: string

jobs:
  build:
    strategy:
      matrix:
        include:
          - version: 7.3 
            platform: epyc7002
          #- version: 7.3
          #  platform: v1000nk
          #- version: 7.3
          #  platform: r1000nk
          #- version: 7.3
          #  platform: geminilakenk

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Install GCC 12
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y gcc-12 g++-12
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 70
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 70
          
          # Set GCC 12 as the default (optional)
          sudo update-alternatives --set gcc /usr/bin/gcc-12
          sudo update-alternatives --set g++ /usr/bin/g++-12
      
          # Verify installation
          gcc --version
          g++ --version        

      - name: Init Env
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          sudo timedatectl set-timezone "Asia/Shanghai" 

      - name: Cache EnvDeploy
        id: cache-env
        uses: actions/cache@v4
        env:
          cache-name: cache-env
        with:
          path: |
            ${{ github.workspace }}/pkgscripts-ng
            # build_env 제외: 동적 파일 문제
          key: ds.${{ matrix.platform }}-${{ matrix.version }}

      - name: Get EnvDeploy
        # if: ${{ steps.cache-env.outputs.cache-hit != 'true' }}
        run: |
          ROOT_PATH=${{ github.workspace }}
          rm -rf ${{ github.workspace }}/pkgscripts-ng || true
          git clone https://github.com/SynologyOpenSource/pkgscripts-ng.git ${ROOT_PATH}/pkgscripts-ng
          cd ${ROOT_PATH}/pkgscripts-ng
          # if version == 6.2, checkout 6.2.4
          git checkout DSM${{ matrix.version }}`[ "${{ matrix.version }}" = "6.2" ] && echo ".4"`
          sudo ./EnvDeploy -v ${{ matrix.version }}`[ "${{ matrix.version }}" = "6.2" ] && echo ".4"` -l  # Get Available platforms
          sudo ./EnvDeploy -q -v ${{ matrix.version }} -p ${{ matrix.platform }}

          #ENV
          mkdir -p ${ROOT_PATH}/source

          ENV_PATH=${ROOT_PATH}/build_env/ds.${{ matrix.platform }}-${{ matrix.version }}
          sudo cp -al ${ROOT_PATH}/pkgscripts-ng ${ENV_PATH}/

          sudo chroot ${ENV_PATH} << "EOF"
          cd pkgscripts

          version=${{ matrix.version }}; [ ${version:0:1} -gt 6 ] && sed -i 's/print(" ".join(kernels))/pass #&/' ProjectDepends.py
          sed -i '/PLATFORM_FAMILY/a\\techo "PRODUCT=$PRODUCT" >> $file\n\techo "KSRC=$KERNEL_SEARCH_PATH" >> $file\n\techo "LINUX_SRC=$KERNEL_SEARCH_PATH" >> $file' include/build
          ./SynoBuild -c -p ${{ matrix.platform }}

          while read line; do if [ ${line:0:1} != "#" ]; then export ${line%%=*}="${line#*=}"; fi; done < /env${BUILD_ARCH}.mak
          if [ -f "${KSRC}/Makefile" ]; then
            # gcc issue "unrecognized command-line option '--param=allow-store-data-races=0'".
            [ "${{ matrix.version }}" == "7.2" ] && sed -i 's/--param=allow-store-data-races=0/--allow-store-data-races/g' ${KSRC}/Makefile

            VERSION=`cat ${KSRC}/Makefile | grep ^VERSION | awk -F' ' '{print $3}'`
            PATCHLEVEL=`cat ${KSRC}/Makefile | grep ^PATCHLEVEL | awk -F' ' '{print $3}'`
            SUBLEVEL=`cat ${KSRC}/Makefile | grep ^SUBLEVEL | awk -F' ' '{print $3}'`
            [ -f "/env32.mak" ] && echo "KVER=${VERSION}.${PATCHLEVEL}.${SUBLEVEL}" >> /env32.mak
            [ -f "/env64.mak" ] && echo "KVER=${VERSION}.${PATCHLEVEL}.${SUBLEVEL}" >> /env64.mak
            CCVER=`$CC --version | head -n 1 | awk -F' ' '{print $3}'`
            [ -f "/env32.mak" ] && echo "CCVER=${CCVER}" >> /env32.mak
            [ -f "/env64.mak" ] && echo "CCVER=${CCVER}" >> /env64.mak
          fi
          EOF
          
          [ -f ${ENV_PATH}/env64.mak ] && ENV_FILE=${ENV_PATH}/env64.mak || ([ -f ${ENV_PATH}/env32.mak ] && ENV_FILE=${ENV_PATH}/env32.mak)
          if [ -n "${ENV_FILE}" ]; then
            KVER=`grep 'KVER=' ${ENV_FILE} | awk -F'=' '{print $2}'`
            CCVER=`grep 'CCVER=' ${ENV_FILE} | awk -F'=' '{print $2}'`
            [ -n "${KVER}" ] && echo "KVER=${KVER}" >> $GITHUB_ENV
            [ -n "${CCVER}" ] && echo "CCVER=${CCVER}" >> $GITHUB_ENV
          fi

      - name: Get Src
        run: |
          ROOT_PATH=${{ github.workspace }}

          mkdir -p ${ROOT_PATH}/source/output
          repo=${{ env.repo }}
          KVER=${{ env.KVER }}

          # 이전 빌드 잔여물 완전 제거
          sudo rm -rf ${ROOT_PATH}/source/input
          mkdir -p ${ROOT_PATH}/source/input
      
          sudo cp -a ${ROOT_PATH}/src/${KVER:0:1}.x/. ${ROOT_PATH}/source/input/
      
          # 빌드 아티팩트 명시적 제거 (혹시 src/ 내에 존재할 경우 대비)
          sudo find ${ROOT_PATH}/source/input -name "*.ko" -delete
          sudo find ${ROOT_PATH}/source/input -name "Module.symvers" -delete
          sudo find ${ROOT_PATH}/source/input -name "modules.order" -delete
      
          sudo cp -a ${ROOT_PATH}/source ${ROOT_PATH}/build_env/ds.${{ matrix.platform }}-${{ matrix.version }}/
          
      - name: Make
        run: |
          ROOT_PATH=${{ github.workspace }}
          sudo chroot build_env/ds.${{ matrix.platform }}-${{ matrix.version }} << "EOF"

          # 환경변수 설정
          sed -i 's/^CFLAGS=/#CFLAGS=/g; s/^CXXFLAGS=/#CXXFLAGS=/g' /env${BUILD_ARCH}.mak
          
          # GCC 7.3 지정 및 Retpoline 플래그 추가
          export CC=gcc-7
          export CXX=g++-7
          export CFLAGS="-mindirect-branch=thunk-inline -mindirect-branch-register -fno-jump-tables"
          export CXXFLAGS="$CFLAGS"
          
          while read line; do if [ ${line:0:1} != "#" ]; then export ${line%%=*}="${line#*=}"; fi; done < /env${BUILD_ARCH}.mak
          cd /source/input
          [ -z "`grep 'env.mak' Makefile`" ] && sed -i '1 i include /env.mak' Makefile

          if [ -f "defines.${{ matrix.platform }}" ]; then
            PARMS+=" `cat "defines.${{ matrix.platform }}" | xargs`"
          else
            echo "[E] ${{ matrix.platform }}-${{ matrix.version }}"
          fi
          
          cd /source/input

          # ── 핵심 수정 부분 시작 ─────────────────────────────────────
          # 1. 빌드 아티팩트 완전 정리 (Module.symvers 포함)
          make -C "${KSRC}" M="${PWD}" clean 2>/dev/null || true
          rm -f Module.symvers modules.order *.o *.mod.c .*.cmd

          # ── 수정된 심볼 처리 ──────────────────────────────────
          # KBUILD_EXTRA_SYMBOLS 를 사용하지 않는다.
          # kbuild 는 M= 디렉토리의 Module.symvers 를 자동으로 읽는다.
          if [ -f "${KSRC}/Module.symvers" ]; then
            cp "${KSRC}/Module.symvers" "${PWD}/Module.symvers"
          else
            echo "[W] ${KSRC}/Module.symvers not found, creating empty"
            touch "${PWD}/Module.symvers"
          fi
          
          make -j$(nproc) CC="$CC" CXX="$CXX" \
            CFLAGS="$CFLAGS" CXXFLAGS="$CXXFLAGS" \
            -C "${KSRC}" M="${PWD}" \
            KBUILD_MODPOST_WARN=0 \
            ${PARMS} modules
          
          # ── 1. 먼저 .ko 를 output 으로 복사 ─────────────────────
          while read F; do
            strip -g "${F}"
            echo "Copying $(basename ${F})"
            cp "${F}" "/source/output"
          done < <(find "${PWD}" -name \*.ko)
          
          # ── 2. 복사 완료 후 리포트 생성 ─────────────────────────
          REPORT="/source/output/amdgpu-dep-report.txt"
          # amdgpu.ko 는 빌드 트리에서 탐색 (output 이 아닌 PWD 하위)
          AMD_KO=$(find "${PWD}" -name "amdgpu.ko" | head -1)
          
          {
            echo "====================================="
            echo " amdgpu.ko Dependency Report"
            echo " Platform : ${{ matrix.platform }}"
            echo " Kernel   : ${KVER}"
            echo " Built at : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "====================================="
          
            if [ -z "${AMD_KO}" ]; then
              echo "[ERROR] amdgpu.ko not found in build tree — build may have failed"
            else
              echo ""
              echo "[1] modinfo:"
              modinfo "${AMD_KO}" 2>&1 \
                | grep -E '^(filename|version|depends|vermagic|srcversion):'
          
              echo ""
              echo "[2] Undefined symbol check:"
              KNOWN_SYMS=$(mktemp)
              # KSRC Module.symvers 에서 심볼 수집
              awk '{print $2}' "${KSRC}/Module.symvers" 2>/dev/null > "${KNOWN_SYMS}"
              # 출력된 다른 .ko 에서 정의 심볼 수집
              while IFS= read -r KO; do
                nm --defined-only "${KO}" 2>/dev/null | awk '{print $3}'
              done < <(find /source/output -name "*.ko" ! -name "amdgpu.ko") \
                >> "${KNOWN_SYMS}"
          
              UNRESOLVED=$(nm --undefined-only "${AMD_KO}" 2>/dev/null \
                | awk '{print $2}' | grep -v '^$' \
                | grep -vFxf "${KNOWN_SYMS}" || true)
          
              if [ -z "${UNRESOLVED}" ]; then
                echo "  OK: All symbols resolved."
              else
                UNRESOLVED_COUNT=$(echo "${UNRESOLVED}" | wc -l)
                echo "  [WARN] ${UNRESOLVED_COUNT} unresolved symbol(s):"
                echo "${UNRESOLVED}" | head -50 | sed 's/^/    - /'
                [ "${UNRESOLVED_COUNT}" -gt 50 ] \
                  && echo "    ... (truncated, total: ${UNRESOLVED_COUNT})"
              fi
              rm -f "${KNOWN_SYMS}"
          
              echo ""
              echo "[3] depmod -n:"
              KVER_FULL=$(modinfo "${AMD_KO}" 2>/dev/null \
                | grep '^vermagic' | awk '{print $2}')
              if command -v depmod >/dev/null 2>&1 && [ -n "${KVER_FULL}" ]; then
                DEPMOD_TMP=$(mktemp -d)
                MOD_DIR="${DEPMOD_TMP}/lib/modules/${KVER_FULL}"
                mkdir -p "${MOD_DIR}"
                find /source/output -name "*.ko" -exec cp {} "${MOD_DIR}/" \;
                depmod -n -b "${DEPMOD_TMP}" "${KVER_FULL}" 2>&1 \
                  | grep "amdgpu" \
                  || echo "  (no amdgpu entry — depmod may lack dependency info)"
                rm -rf "${DEPMOD_TMP}"
              else
                echo "  [SKIP] depmod not available or vermagic empty"
              fi
          
              echo ""
              echo "[4] Total modules in output: $(find /source/output -name '*.ko' | wc -l)"
              echo "[5] amdgpu.ko size: $(du -h ${AMD_KO} | awk '{print $1}')"
            fi
            echo "====================================="
          } | tee "${REPORT}"
          EOF

          sudo cp -a ${ROOT_PATH}/build_env/ds.${{ matrix.platform }}-${{ matrix.version }}/source/output ${ROOT_PATH}/source/
          sudo chmod a+rw -R ${ROOT_PATH}/source/output

      - name: Tar to Artifacts
        run: |
          #OFFICIAL_PATH="${{ github.workspace }}/official/${{ matrix.platform }}-${{ env.KVER }}"
          PARTY3RD_PATH="${{ github.workspace }}/thirdparty/${{ matrix.platform }}-${{ env.KVER }}"

          # echo "copy official modules"
          # for M in `ls ${{ github.workspace }}/source/output`; do
          #   [ -f ${OFFICIAL_PATH}/${M} ] && cp -f ${OFFICIAL_PATH}/${M} "${{ github.workspace }}/source/output"
          # done

          #echo "copy 3rd modules"
          [ -d "${PARTY3RD_PATH}" ] && cp -rf "${PARTY3RD_PATH}/." "${{ github.workspace }}/source/output"

          tar caf ${{ github.workspace }}/source/${{ matrix.platform }}-${{ env.KVER }}.tgz -C ${{ github.workspace }}/source/output .

      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modules-${{ matrix.platform }}-${{ matrix.version }}
          path: |
            ${{ github.workspace }}/source/*.tgz
            
      - name: clean
        run: |
          sudo rm -rf ${{ github.workspace }}/build_env/ds.${{ matrix.platform }}-${{ matrix.version }}/source/*
